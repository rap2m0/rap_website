<!DOCTYPE html>

<html>

<head>

    <title>table in website</title>


    <style>
        .table-header {

            background-color: green;
            color: white;


        }
    </style>

    <style>
        .table-below {

            background-color: lightgreen;
            color: rgb(0, 0, 0);
            width: 300%;
            height: 300%;

        }
    </style>
</head>

<body>

    <!-- BASTA TABLE-->
    <table style="background-color: black;" width="700">

        <!-- TR OR TABLE ROW-> self explanatory-->
        <tr class="table-header">

            <!-- TD OR TABLE HEADER-> self explanatory-->
            <td>Sunday</td>
            <td>Monday</td>
            <td>Tuesday</td>
            <td>Wednesday</td>
            <td>Thursday</td>
            <td>Friday</td>
            <td>Saturday</td>
        </tr>

        <tr class="table-below">

            <!-- TD OR TABLE DATA-> basta ung sa baba ng header ganun-->
            <td>closed</td>
            <td>Open</td>
            <td>Open</td>
            <td>Open</td>
            <td>Open</td>
            <td>Open</td>
            <td>closed</td>
        </tr>






    </table>

    <!-- JAVA SCRIPT TOH,, PANG PRIVACY LANG-->
    <script src="privacy.js"> </script>

</body>

</html>
