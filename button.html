<!DOCTYPE html>

<html>

<head>
    <title>buttons in website</title>


    <style>
        .ip {
            font-size: clamp(16px, 3vw, 20px);
            background-color: rgb(98, 0, 255);
            color: aqua;
            border-radius: 25px;
            margin: 10px;

            position: absolute;
            top: 10px;
            right: 10px;

            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .ip:hover {
            background-color: #ff00a2;
            /* Changes color smoothly */
            transform: scale(1.05);
            /* Makes it slightly bigger smoothly */
        }
    </style>
</head>


<body>

    <!-- BUTTONS-> SELF EXPLANATORY-->
    <button class="ip"> IP ADDRESS</button>

    <!-- JAVA SCRIPT TOH,, PANG PRIVACY LANG-->
    <script src="privacy.js"> </script>

</body>


</html>
